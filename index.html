<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Invitation ❤️</title>


<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


</head>

<body>
<div id="cover">
    <div class="envelope">
        💌
        <h2>A Special Message For You</h2>
        <p>Click to Open ❤️</p>
    </div>
</div>

<div id="mainContent" class="hidden">

<div class="hearts"></div>
<div class="container">
    <div class="card">

        <h1>❤️ For Someone Special ❤️</h1>

        <p class="message">
            There is something I've wanted to ask you...
        </p>

        <h2>
            Would you like to go on a date with me?
        </h2>

        <div class="buttons">

            <button id="yesBtn" class="yes-btn">
                Yes ❤️
            </button>

            <button id="noBtn" class="no-btn">
                No 😔
            </button>
            <div id="noMessage" class="no-message"></div>
        </div>

        <div id="result"></div>

    </div>

</div>
<div class="music-player">

    <button id="musicBtn">
        ▶️ Play Music
    </button>

    <span class="song-title">
        🎵 Date Night Vibes
    </span>

    <audio id="bgMusic" loop>
        <source src="music/song.mp3" type="audio/mpeg">
    </audio>

</div>
<script>

const APP_CONFIG = {

    emailjs: {

        publicKey: "a6jKGz3ejP5oOS0uQ",

        serviceId: "service_av8q17j",

        templateId: "template_m8lefqq"

    },

    notificationEmail:
    "Mahaendraprabowo@gmail.com"

};

</script>
</div>
    
<script src="script.js"></script>


</body>
</html>
